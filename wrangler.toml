name = "roblox-credentials-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Optional: set your Cloudflare account ID here if required for deploy.
# account_id = "YOUR_ACCOUNT_ID"

# This worker stores data in Google Drive instead of Cloudflare KV.
# Configure the following secrets in your Worker environment:
#   npx wrangler secret put GOOGLE_SERVICE_ACCOUNT_JSON
#   npx wrangler secret put GOOGLE_DRIVE_FILE_ID